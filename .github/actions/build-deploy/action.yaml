name: backward-compatibility-plugin
description: backward-compatibility-plugin
inputs:
  branch:
    description: 'Branch name to determine build or deploy'
    required: false
    default: ''
  project-path:
    description: 'Path to the Maven project'
    required: true
runs:
  using: "composite"
  steps:
    - name: Validate project path
      shell: bash
      run: |
        POM="${{ inputs.project-path }}/pom.xml"
        if [ ! -f "$POM" ]; then
          echo "::error::Cannot find Maven project at $POM"
          exit 1
        fi
    - name: Build or Deploy
      shell: bash
      run: |
        if [[ "${{ inputs.branch }}" != "main" ]]; then
          mvn -f "${{ inputs.project-path }}/pom.xml" -B -e -U deploy -DskipTests=true -DskipITs=true -s ./settings.xml
        else
          mvn -f "${{ inputs.project-path }}/pom.xml" -B -e -U clean install
        fi